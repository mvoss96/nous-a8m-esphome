substitutions:
  name: nous-a8m
  friendly_name: Nous A8M
  max_power: "2000"       # In Watt
  current_res: "0.00126"  # Higher value gives lower watt readout
  voltage_div: "1570"     # Lower value gives lower voltage readout

esphome:
  platformio_options:
    board_flash.calibration: "0x1E3000+0x1000"
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  project:
    name: "NOUS.Smart-Wifi-Socket"
    version: "A8M"
  on_boot:
    priority: 200
    then:
      - if:
          condition:
            switch.is_on: relay
          then:
            - light.turn_on: led
          else:
            - light.turn_off: led

bk72xx:
  board: generic-bk7231n-qfn32-tuya

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
  - platform: esphome

# Allow provisioning Wi-Fi via serial
improv_serial:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap: {}

captive_portal:

time:
  - platform: homeassistant
    id: my_time

globals:
  - id: total_energy
    type: float
    restore_value: true
    initial_value: "0.0"

light:
  - platform: status_led
    internal: True
    name: "Switch state"
    id: led
    pin:
      number: P8
      inverted: true

binary_sensor:
  - platform: gpio
    name: "push_button"
    id: "push_button"
    #internal: true
    pin:
      number: P7
      inverted: yes
      mode: INPUT_PULLUP
    on_press:
      - switch.toggle: "relay"

switch:
  - platform: gpio
    pin: P6
    id: relay
    name: "Relay"
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:power
    on_turn_on:
      - light.turn_on: led
    on_turn_off:
      - light.turn_off: led

sensor:
  - platform: hlw8012
    model: BL0937
    current_resistor: 0.00112
    voltage_divider: 768
    sel_pin:
      number: P14
      inverted: True
    cf_pin:
      number: P24
      inverted: True
    cf1_pin:
      number: P26
      inverted: True
    current:
      name: "Current"
    voltage:
      name: "Voltage"
    power:
      name: "Power"
    energy:
      name: "Energy"
    update_interval: 10s